<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SiteOS Presentation</title>
  <link rel="preload" as="image" href="1-intro.png">
  <link rel="preload" as="image" href="2-scenario.png">
  <link rel="preload" as="image" href="3-flow.png">
  <link rel="preload" as="image" href="4-telegram-agent.png">
  <link rel="preload" as="image" href="5-blocks.png">
  <link rel="preload" as="image" href="6-marketing-team.png">
  <link rel="preload" as="image" href="7-demo-messenger.png">
  <link rel="preload" as="image" href="8-security.png">
  <link rel="preload" as="image" href="9-tech-stack.png">
  <link rel="preload" as="image" href="10-architecture.png">
  <link rel="preload" as="image" href="11-support.png">
  <link rel="preload" as="image" href="12-estimates.png">
  <link rel="preload" as="image" href="13-cta.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --panel: #050505;
      --button: #111;
      --button-hover: #1c1c1c;
      --text: #fff;
      --muted: rgba(255, 255, 255, .68);
      --line: rgba(255, 255, 255, .14);
      --accent: #fff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
    }

    .slide-image {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: var(--bg);
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .loading.is-hidden {
      visibility: hidden;
      opacity: 0;
    }

    .loading__box {
      min-width: 260px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
    }

    .loading__title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -.02em;
    }

    .loading__bar {
      height: 4px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, .12);
    }

    .loading__progress {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 120ms ease;
    }

    .controls {
      position: fixed;
      bottom: 14px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 6px;
      align-items: center;
      width: auto;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      transform: translateX(-50%);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .controls.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 14px);
    }

    .controls__group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .button {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--button);
      color: var(--text);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .button:hover {
      border-color: rgba(255, 255, 255, .36);
      background: var(--button-hover);
      color: var(--accent);
    }

    .button:active { transform: translateY(1px); }

    .button:focus-visible {
      outline: 2px solid rgba(255, 255, 255, .42);
      outline-offset: 2px;
    }

    .icon {
      display: block;
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.25;
    }

    .icon--chevron {
      width: 20px;
      height: 20px;
    }

    .icon--exit,
    .button.is-fullscreen .icon--enter { display: none; }
    .button.is-fullscreen .icon--exit { display: block; }
  </style>
</head>
<body>
  <main class="stage" aria-live="polite">
    <img id="slide" class="slide-image" alt="Слайд 1" src="1-intro.png">
  </main>

  <div id="loading" class="loading" role="status">
    <div class="loading__box">
      <p id="loadingText" class="loading__title">Загрузка слайдов 0/13</p>
      <div class="loading__bar" aria-hidden="true">
        <div id="loadingProgress" class="loading__progress"></div>
      </div>
    </div>
  </div>

  <nav id="controls" class="controls" aria-label="Навигация по слайдам">
    <div class="controls__group">
      <button id="prev" class="button" type="button" aria-label="Предыдущий слайд" title="Предыдущий слайд">
        <svg class="icon icon--chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"></path></svg>
      </button>
      <button id="next" class="button" type="button" aria-label="Следующий слайд" title="Следующий слайд">
        <svg class="icon icon--chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
      </button>
      <button id="fullscreen" class="button" type="button" aria-label="Полный экран" title="Полный экран">
        <svg class="icon icon--enter" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
          <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
          <path d="M21 16v3a2 2 0 0 1-2 2h-3"></path>
          <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
        </svg>
        <svg class="icon icon--exit" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 3v3a2 2 0 0 1-2 2H3"></path>
          <path d="M16 3v3a2 2 0 0 0 2 2h3"></path>
          <path d="M21 16h-3a2 2 0 0 0-2 2v3"></path>
          <path d="M3 16h3a2 2 0 0 1 2 2v3"></path>
        </svg>
      </button>
    </div>
  </nav>

  <script>
    const slides = [
      "1-intro.png",
      "2-scenario.png",
      "3-flow.png",
      "4-telegram-agent.png",
      "5-blocks.png",
      "6-marketing-team.png",
      "7-demo-messenger.png",
      "8-security.png",
      "9-tech-stack.png",
      "10-architecture.png",
      "11-support.png",
      "12-estimates.png",
      "13-cta.png"
    ];

    const slideEl = document.getElementById("slide");
    const controlsEl = document.getElementById("controls");
    const prevEl = document.getElementById("prev");
    const nextEl = document.getElementById("next");
    const fullscreenEl = document.getElementById("fullscreen");
    const loadingEl = document.getElementById("loading");
    const loadingTextEl = document.getElementById("loadingText");
    const loadingProgressEl = document.getElementById("loadingProgress");

    let index = 0;
    let hideTimer = 0;
    let loadedCount = 0;

    function preloadSlides() {
      return Promise.all(slides.map((src) => new Promise((resolve) => {
        const image = new Image();
        image.onload = image.onerror = () => {
          loadedCount += 1;
          loadingTextEl.textContent = `Загрузка слайдов ${loadedCount}/${slides.length}`;
          loadingProgressEl.style.width = `${Math.round((loadedCount / slides.length) * 100)}%`;
          resolve();
        };
        image.src = src;
      })));
    }

    function update() {
      slideEl.src = slides[index];
      slideEl.alt = `Слайд ${index + 1}`;
      showControls();
    }

    function goTo(nextIndex) {
      index = Math.max(0, Math.min(slides.length - 1, nextIndex));
      update();
    }

    function showControls() {
      controlsEl.classList.remove("is-hidden");
      window.clearTimeout(hideTimer);
      hideTimer = window.setTimeout(() => {
        controlsEl.classList.add("is-hidden");
      }, 2200);
    }

    function updateFullscreenLabel() {
      const active = Boolean(document.fullscreenElement);
      fullscreenEl.classList.toggle("is-fullscreen", active);
      fullscreenEl.setAttribute("aria-label", active ? "Выйти из полного экрана" : "Полный экран");
      fullscreenEl.setAttribute("title", active ? "Выйти из полного экрана" : "Полный экран");
    }

    async function toggleFullscreen() {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        await document.documentElement.requestFullscreen();
      }
      updateFullscreenLabel();
      showControls();
    }

    prevEl.addEventListener("click", () => goTo(index - 1));
    nextEl.addEventListener("click", () => goTo(index + 1));
    fullscreenEl.addEventListener("click", () => toggleFullscreen().catch(() => {}));
    document.addEventListener("fullscreenchange", updateFullscreenLabel);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        goTo(index + 1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        goTo(index - 1);
      }
      if (event.key === "Home") {
        event.preventDefault();
        goTo(0);
      }
      if (event.key === "End") {
        event.preventDefault();
        goTo(slides.length - 1);
      }
      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        toggleFullscreen().catch(() => {});
      }
      showControls();
    });

    ["mousemove", "mousedown", "touchstart", "pointermove"].forEach((eventName) => {
      document.addEventListener(eventName, showControls, { passive: true });
    });

    update();
    preloadSlides().then(() => {
      loadingEl.classList.add("is-hidden");
      showControls();
    });
  </script>
</body>
</html>
